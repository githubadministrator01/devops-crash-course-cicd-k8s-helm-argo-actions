name: Deploy Node.js app via Helm + Argo CD

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Docker image tag to deploy"
        required: true
        type: string
      chart_dir:
        description: "Path to the Helm chart in the repo"
        required: true
        type: string
      runs_on:
        description: "GitHub runner label or JSON array of labels to run the job on (e.g. 'ubuntu-latest', '[\"self-hosted\",\"wsl-2\",\"docker\"]')"
        required: false
        type: string
    secrets:
      package_token:
        required: true
      ARGOCD_PASSWORD:
        required: true

jobs:
  deploy:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PACKAGE_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: |
          CHART_DIR=${{ inputs.chart_dir }}
          helm lint $CHART_DIR
          helm template my-node-app $CHART_DIR -f $CHART_DIR/values.yaml

      - name: Update Helm chart values with new image tag
        run: |
          # Path to your Helm chart inside this repo
          CHART_DIR=${{ inputs.chart_dir }}

          # Docker image tag from workflow input
          IMAGE_TAG=${{ inputs.image_tag }}

          # Update values.yaml
          echo "Updating image tag to ${IMAGE_TAG} in ${CHART_DIR}/values.yaml"
          sed -i "s|tag:.*|tag: ${IMAGE_TAG}|" $CHART_DIR/values.yaml

          # Commit and push changes
          echo "Committing and pushing changes to $CHART_DIR/values.yaml"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add $CHART_DIR/values.yaml
          git commit -m "Deploy image tag ${IMAGE_TAG} [skip ci]"
          git push

      - name: Trigger Argo CD sync
        env:
          ARGOCD_SERVER: argocd.example.com
        run: |
          set -euo pipefail

          # Install Argo CD CLI
          echo "Ensuring Argo CD CLI is installed"
          if command -v argocd >/dev/null 2>&1; then
            echo "argocd is already installed at $(command -v argocd)"
          else
            echo "argocd not found, installing..."
            OS=$(uname -s)
            ARCH=$(uname -m)
            case "${OS}-${ARCH}" in
              Linux-x86_64|Linux-amd64)
                URL="https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64" ;;
              Linux-arm64|Linux-aarch64)
                URL="https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-arm64" ;;
              Darwin-x86_64|Darwin-amd64)
                URL="https://github.com/argoproj/argo-cd/releases/latest/download/argocd-darwin-amd64" ;;
              Darwin-arm64|Darwin-aarch64)
                URL="https://github.com/argoproj/argo-cd/releases/latest/download/argocd-darwin-arm64" ;;
              *)
                echo "Unsupported platform: ${OS}-${ARCH}" >&2
                exit 1
                ;;
            esac
            tmpfile=$(mktemp)
            curl -fsSL "$URL" -o "$tmpfile"
            sudo install -m 755 "$tmpfile" /usr/local/bin/argocd
            argocd version --client
          fi

          # Log in to Argo CD
          echo "Logging in to Argo CD"
          argocd login "$ARGOCD_SERVER" --username admin --password "${{ secrets.ARGOCD_PASSWORD }}" --insecure --grpc-web

          # Trigger sync and wait for the app to be healthy
          echo "Triggering Argo CD sync for my-node-app"
          argocd app sync my-node-app --prune --timeout 300
          echo "Sync triggered, waiting for the app to be healthy"

          # Wait for the app to be healthy
          echo "Waiting for my-node-app to be healthy"
          argocd app wait my-node-app --timeout 300
          echo "my-node-app is healthy and synced"

          # Check the status of the app
          echo "Checking the status of my-node-app"
          argocd app get my-node-app
      
      - name: Verify deployment and pod readiness
        run: |
          set -euo pipefail

          echo "Ensuring kubectl is installed"
          - name: Install kubectl
            uses: azure/setup-kubectl@v4
            with:
              version: v1.34.1 
            id: install
          
          # Configure kubeconfig
          - name: Configure Kubeconfig
            uses: azure/k8s-set-context@v4
            with:
              method: kubeconfig
              kubeconfig: ${{ secrets.KUBECONFIG }}

          echo "Verifying deployment and pod readiness in the 'apps' namespace"
          kubectl rollout status deployment my-app-nodejs -n apps --timeout=300s
          echo "<-------Deployment is successful, checking pod readiness--------> "

          echo "Waiting for pods in the 'apps' namespace to be ready"
          kubectl wait --namespace apps --for=condition=ready pod -l app.kubernetes.io/name=nodejs --timeout=300s
          echo "<-------All pods are ready"-------->
          