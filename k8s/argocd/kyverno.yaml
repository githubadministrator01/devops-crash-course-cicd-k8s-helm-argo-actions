apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: platform-services
  sources:
    - repoURL: 'https://kyverno.github.io/kyverno/'
      chart: kyverno
      targetRevision: 3.3.6
      helm:
        releaseName: kyverno
        valueFiles:
          - $values/helm/kyverno/values.yaml
    - repoURL: 'https://github.com/githubadministrator01/devops-crash-course-cicd-k8s-helm-argo-actions.git'  # replace with your repo
      targetRevision: main
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kyverno
  syncPolicy:
    syncOptions:
      - PruneLast=true     # prune resources in the last step
      - CreateNamespace=true  # automatically create namespace if missing
      - ServerSideApply=true  # use server-side apply for better merging